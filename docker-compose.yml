services:
  mysql:
    image: mysql:8.0
    container_name: noah_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: noah_webstore
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  legacy-adapter:
    build:
      context: ./legacy_adapter
    container_name: noah_legacy_adapter
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: noah_webstore
    volumes:
      - ./input:/app/input
      - ./processed:/app/processed

volumes:
  mysql_data: