_format_version: "3.0"
_transform: true

services:
  - name: order-api
    url: http://order-api:5000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false

  - name: report-service
    url: http://report-service:5001
    routes:
      - name: report-route
        paths:
          - /report
        strip_path: false

consumers:
  - username: noah-client
    keyauth_credentials:
      - key: noah-secret-key

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: true

  - name: rate-limiting
    config:
      minute: 10
      limit_by: consumer
      policy: local

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
      exposed_headers:
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
      credentials: false
      max_age: 3600