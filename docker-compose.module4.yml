name: noah-project-module-4

services:
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: "off"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000"
    volumes:
      - ./kong.module4.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - order-api
      - report-service

  order-api:
    build:
      context: .
      dockerfile_inline: |
        # syntax=docker/dockerfile:1.7
        FROM python:3.12-slim
        WORKDIR /app
        RUN pip install --no-cache-dir flask pymysql pika
        COPY order_api/app.py /app/app.py
        RUN python <<'PY'
        from pathlib import Path

        p = Path('/app/app.py')
        s = p.read_text(encoding='utf-8')
        s = s.replace('MYSQL_HOST = "127.0.0.1"', 'MYSQL_HOST = "mysql"')
        s = s.replace('MYSQL_PASSWORD = "0905632186aA"', 'MYSQL_PASSWORD = "0905632186aA"')
        s = s.replace('MYSQL_DATABASE = "init"', 'MYSQL_DATABASE = "init"')
        s = s.replace('pika.ConnectionParameters(host="localhost")', 'pika.ConnectionParameters(host="rabbitmq")')
        s = s.replace('@app.route("/api/orders", methods=["POST"])', '@app.route("/orders", methods=["POST"])\n@app.route("/api/orders", methods=["POST"])')
        list_orders = '''
        @app.route("/orders", methods=["GET"])
        def list_orders():
            conn = get_mysql_connection()
            cursor = conn.cursor()
            cursor.execute("""
                SELECT id, user_id, product_id, quantity, total_price, status, created_at
                FROM orders
                ORDER BY id DESC
                LIMIT 20
            """)
            orders = cursor.fetchall()
            cursor.close()
            conn.close()
            return jsonify({"orders": orders})
        '''
        s = s.replace('\n\nif __name__ == "__main__":', '\n' + list_orders + '\nif __name__ == "__main__":')
        s = s.replace('app.run(debug=True, port=5000)', 'app.run(host="0.0.0.0", port=5000)')
        p.write_text(s, encoding='utf-8')
        PY
        EXPOSE 5000
        CMD ["python", "app.py"]
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile_inline: |
        # syntax=docker/dockerfile:1.7
        FROM python:3.12-slim
        WORKDIR /app
        RUN pip install --no-cache-dir flask psycopg2-binary
        RUN python <<'PY'
        from pathlib import Path

        Path('/app/app.py').write_text('''
        import os
        import time

        import psycopg2
        from flask import Flask, jsonify

        app = Flask(__name__)

        POSTGRES_HOST = os.getenv("POSTGRES_HOST", "postgres")
        POSTGRES_DATABASE = os.getenv("POSTGRES_DATABASE", "noah_finance")
        POSTGRES_USER = os.getenv("POSTGRES_USER", "postgres")
        POSTGRES_PASSWORD = os.getenv("POSTGRES_PASSWORD", "123456")


        def retry(operation, attempts=20, delay=2):
            last_error = None
            for _ in range(attempts):
                try:
                    return operation()
                except Exception as exc:
                    last_error = exc
                    time.sleep(delay)
            raise last_error


        def get_postgres_connection():
            return retry(
                lambda: psycopg2.connect(
                    host=POSTGRES_HOST,
                    database=POSTGRES_DATABASE,
                    user=POSTGRES_USER,
                    password=POSTGRES_PASSWORD,
                )
            )


        @app.route("/report", methods=["GET"])
        def report():
            conn = get_postgres_connection()
            cursor = conn.cursor()
            cursor.execute("""
                SELECT COUNT(*) AS total_transactions,
                       COALESCE(SUM(total_price), 0) AS total_revenue
                FROM public.transactions
            """)
            total_transactions, total_revenue = cursor.fetchone()
            cursor.close()
            conn.close()
            return jsonify({
                "total_transactions": total_transactions,
                "total_revenue": float(total_revenue),
            })


        if __name__ == "__main__":
            app.run(host="0.0.0.0", port=5001)
        ''', encoding='utf-8')
        PY
        EXPOSE 5001
        CMD ["python", "app.py"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: noah_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    expose:
      - "5001"
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  order-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile_inline: |
        # syntax=docker/dockerfile:1.7
        FROM python:3.12-slim
        WORKDIR /app
        RUN pip install --no-cache-dir pymysql pika psycopg2-binary
        COPY order_worker/worker.py /app/worker.py
        RUN python <<'PY'
        from pathlib import Path

        p = Path('/app/worker.py')
        s = p.read_text(encoding='utf-8')
        s = s.replace('MYSQL_HOST = "127.0.0.1"', 'MYSQL_HOST = "mysql"')
        s = s.replace('POSTGRES_HOST = "127.0.0.1"', 'POSTGRES_HOST = "postgres"')
        s = s.replace('pika.ConnectionParameters(host="localhost")', 'pika.ConnectionParameters(host="rabbitmq")')
        p.write_text(s, encoding='utf-8')
        PY
        CMD ["python", "worker.py"]
    depends_on:
      mysql:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 0905632186aA
      MYSQL_DATABASE: init
    volumes:
      - module4_mysql_data:/var/lib/mysql
      - "./database/init .sql:/docker-entrypoint-initdb.d/init.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p0905632186aA"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noah_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - module4_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noah_finance"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: 123456
    command:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -d noah_finance -c "
        CREATE TABLE IF NOT EXISTS public.transactions (
          id SERIAL PRIMARY KEY,
          order_id INT,
          user_id INT,
          product_id INT,
          quantity INT,
          total_price DECIMAL(10,2),
          status VARCHAR(50),
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );"
    depends_on:
      postgres:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  module4_mysql_data:
  module4_postgres_data: